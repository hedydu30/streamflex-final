    <!-- Anti-flash thème : applique les couleurs avant React -->
    <script>
      try {
        var c = localStorage.getItem("sf_theme");
        if (c) {
          var colors = JSON.parse(c);
          var r = document.documentElement;
          for (var k in colors) { if (colors[k]) r.style.setProperty("--" + k, colors[k]); }
        }
      } catch(e) {}
    </script>
